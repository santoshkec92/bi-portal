# EXAMPLE ONLY — do not commit real secrets. In production these are managed by
# your platform's secret tooling (External Secrets Operator -> AWS Secrets
# Manager / Vault), or `kubectl create secret generic ... --from-literal=...`.
#
# The Deployment consumes these via envFrom (secretRef), so rotating a secret is
# a rollout, not a code change.
apiVersion: v1
kind: Secret
metadata:
  name: bi-portal-secrets
  namespace: bi-portal
type: Opaque
stringData:
  SESSION_SECRET: "replace-with-32+-random-bytes"
  OKTA_CLIENT_ID: "0oaXXXXXXXXXXXXXX"
  OKTA_CLIENT_SECRET: "replace-with-okta-client-secret"
  ANTHROPIC_API_KEY: "sk-ant-XXXXXXXXXXXX"
  DATABASE_URL: "postgresql+psycopg2://bi:CHANGE_ME@bi-portal-db:5432/bi_portal"
  SNOWFLAKE_ACCOUNT: "xy12345.us-east-1"
  SNOWFLAKE_USER: "BI_PORTAL_SVC"
  SNOWFLAKE_PASSWORD: "replace-me"
  SNOWFLAKE_WAREHOUSE: "BI_WH"
  SNOWFLAKE_DATABASE: "PROD"
